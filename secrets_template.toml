# ══════════════════════════════════════════════════════
# OPTION MATRIX — Fyers Credentials
# Copy this file to secrets.toml and fill in real values
# NEVER commit secrets.toml to GitHub
# ══════════════════════════════════════════════════════

# ── METHOD 1: Direct Access Token (EASIEST — recommended) ─────────────────
# Get this from: Fyers Web → My Account → API → Your App → Generate Token
# Paste the full access token string below.
# Token expires daily — update this each morning.
FYERS_ACCESS_TOKEN = ""

# ── METHOD 2: Auto TOTP login (fully automated) ────────────────────────────
# If FYERS_ACCESS_TOKEN is empty, the app will try to auto-login using these.
# All 5 must be filled for auto-login to work.
FYERS_CLIENT_ID  = "YOUR_APP_ID-100"      # from Fyers API dashboard
FYERS_SECRET_KEY = "YOUR_SECRET_KEY"       # from Fyers API dashboard
FYERS_USERNAME   = "your_fyers_client_id" # your Fyers login ID e.g. XY12345
FYERS_PIN        = "1234"                  # your 4-digit Fyers PIN
FYERS_TOTP_KEY   = "BASE32TOTPSECRET"      # Base32 secret from authenticator app setup
                                            # (NOT the 6-digit code — the long secret key)

# ── HOW TO GET FYERS_TOTP_KEY ──────────────────────────────────────────────
# 1. Go to Fyers Web → My Account → Security → Two-Factor Authentication
# 2. Enable TOTP → it shows a QR code AND a text secret (Base32 string)
# 3. Copy that Base32 string (looks like: JBSWY3DPEHPK3PXP)
# 4. Paste it as FYERS_TOTP_KEY above
# 5. Also scan the QR in Google Authenticator as usual
